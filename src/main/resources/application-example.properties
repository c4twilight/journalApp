spring.application.name=journalApp

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/journalApp
spring.data.mongodb.auto-index-creation=true

# Redis
spring.redis.host=localhost
spring.redis.port=6379

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@example.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
jwt.secret=replace-with-strong-secret-min-32-chars

# Weather API
weather.api.key=replace-with-weather-api-key

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=weekly-sentiment-group
